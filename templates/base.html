<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block titre %}{{ site.nom }}{% endblock %}</title>
<meta name="description" content="{{ site.accroche }}">
<link rel="icon" type="image/jpeg" href="{{ racine }}/img/logo-fig78.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>{{ css|safe }}</style>
</head>
<body>
<header class="site">
  <div class="conteneur">
    <a class="logo" href="{{ racine }}/index.html"><img
      src="{{ racine }}/img/logo-fig78.jpg" alt="" width="44" height="44">{{ site.nom }}</a>
    <nav class="principal">
      <a href="{{ racine }}/index.html#galerie">Galerie</a>
      <a href="{{ racine }}/index.html#agenda">Agenda</a>
      {% for p in pages %}<a href="{{ racine }}/{{ p.slug }}.html">{{ p.titre }}</a>{% endfor %}
    </nav>
  </div>
</header>

{% block contenu %}{% endblock %}

<footer class="site">
  <div class="conteneur">
    <span>© {{ annee }} {{ site.nom }}</span>
    <span>
      <a href="{{ site.discord }}">Discord</a> ·
      <a href="{{ site.instagram }}">Instagram</a> ·
      <a href="mailto:{{ site.email }}">{{ site.email }}</a>
    </span>
  </div>
</footer>
</body>
</html>
